name: Build Android APK
on:
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/zad.apk

      - name: Delete old release
        run: gh release delete latest --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload New APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "أحدث نسخة من تطبيق زاد"
          files: android/app/build/outputs/apk/debug/zad.apk

      # 👇 الخطوة الجديدة: الرفع المباشر إلى Cloudflare R2
      - name: Upload APK to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto # Cloudflare R2 يستخدم auto كمنطقة افتراضية
        run: |
          aws s3 cp android/app/build/outputs/apk/debug/zad.apk s3://${{ secrets.R2_BUCKET_NAME }}/zad.apk \
            --endpoint-url ${{ secrets.R2_ENDPOINT_URL }} \
            --no-progress